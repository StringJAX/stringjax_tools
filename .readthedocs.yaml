# Read the Docs build configuration for the StringJAX Tools documentation.
#
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for the full
# reference.  This mirrors the JAXVacua layout: `documentation/` contains the
# Sphinx tree with `source/` as the source directory.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: documentation/source/conf.py
  fail_on_warning: false

formats:
  - htmlzip
  - pdf

# Install the package with its documentation extras so autodoc can import the
# package and the Sphinx extension stack declared in pyproject.toml.
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
